{% extends "base.html" %}

{% block body %}
  <main class="page simple-page">
    <article class="card article-shell">
      <p class="eyebrow">Blog</p>
      <p class="blog-date">{{ post.published }}</p>
      <h1>{{ post.title }}</h1>
      <p class="intro">{{ post.description }}</p>
      {% for paragraph in post.content %}
        <p>{{ paragraph }}</p>
      {% endfor %}
      <p class="post-back"><a class="text-link" href="{{ url_for('blog_index') }}">Back to all articles</a></p>
    </article>
  </main>
{% endblock %}
